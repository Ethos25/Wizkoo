<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — wizkoo</title>
<meta name="description" content="This page wandered off the map. Even Atlas hasn't found this one yet.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/footer.css">
<style>
  .not-found {
    margin-top: 60px;
    min-height: calc(100vh - 60px - 180px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: var(--section-pad) var(--content-pad);
  }
  .nf-code {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(12,16,32,0.45);
    margin-bottom: 24px;
  }
  .nf-code::before {
    content: '';
    display: block;
    width: 32px;
    height: 1.5px;
    background: var(--saffron);
    margin-bottom: 12px;
  }
  .nf-title {
    font-family: 'Sora', sans-serif;
    font-weight: 200;
    font-size: 3rem;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    max-width: 560px;
  }
  .nf-title strong { font-weight: 700; }
  .nf-sub {
    font-family: 'Sora', sans-serif;
    font-weight: 400;
    font-size: var(--body-size);
    color: #555;
    line-height: 1.65;
    margin-bottom: 40px;
    max-width: 400px;
  }
  @media (max-width: 768px) {
    .nf-title { font-size: 2rem; }
    .not-found { padding: var(--section-pad-mobile) var(--content-pad-mobile); }
  }
</style>
</head>
<body data-footer-treatment="b">
<div class="cursor" id="cursor"></div>

<div id="wizkoo-nav"></div>
<script src="/components/nav.js"></script>
<a href="#main-content" class="skip-nav">Skip to main content</a>

<!-- ═══ NAV ═══ -->

<main id="main-content">
<div class="not-found">
  <div class="nf-code">404 — Not Found</div>
  <h1 class="nf-title">This page wandered<br><strong>off the map<span class="sp"></span></strong></h1>
  <p class="nf-sub">Even Atlas hasn't found this one yet.</p>
  <a href="index.html" class="btn-main">Go Home</a>
</div>
</main>

<!-- ═══ FOOTER ═══ -->
<div id="site-footer"></div>
<script src="/components/footer.js"></script>

<script>
/* ── Custom cursor ── */
(function(){
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
  var c = document.getElementById('cursor'); if (!c) return;
  var raf;
  document.addEventListener('mousemove', function(e){
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(function(){
      c.style.left = e.clientX + 'px';
      c.style.top  = e.clientY + 'px';
      c.classList.add('visible');
    });
  });
  document.addEventListener('mouseover', function(e){
    var isHover = e.target.closest('a,button,[role="button"],input,select,textarea,label,[onclick],[tabindex],.btn-main,.btn-secondary,.nb');
    c.classList.toggle('hover', !!isHover);
  });
  document.documentElement.addEventListener('mouseleave', function(){
    c.classList.remove('visible');
  });
})();
</script>
</body>
</html>
