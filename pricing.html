<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Price — wizkoo</title>
<meta name="description" content="$50/month or $499/year. All your kids. Cancel anytime.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --saffron:#E8AF38;--ink:#0C1020;--linen:#F2F0EA;--warm-bg:#ECEAE3;
  --rule:#E0DED6;--mid:#666;
  --expo:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--linen);color:var(--ink);overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ── NAV ── */
.site-nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;background:rgba(12,16,32,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.site-nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,175,56,0.4),transparent);opacity:0.4}
.nav-bar{display:flex;align-items:center;height:100%;padding:0 32px;gap:24px}
.nav-wm{font-family:'Sora',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.04em;color:#F2F0EA;text-decoration:none;margin-right:auto;flex-shrink:0}
.nav-wm .i-fix{font-style:italic}
.nav-wm .k{letter-spacing:-0.06em}
.nav-wm .wm-dot{color:var(--saffron)}
.nav-center{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;gap:28px;flex:1;justify-content:center}
.nav-science{font-family:'Space Mono',monospace;font-weight:400;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(250,250,250,0.3);text-decoration:none;transition:color .25s;white-space:nowrap;position:relative;padding-bottom:2px}
.nav-science::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--saffron);transition:width .3s var(--expo)}
.nav-science:hover{color:rgba(250,250,250,0.8)}
.nav-science:hover::after{width:100%}
.nav-science.active{color:rgba(250,250,250,0.85)}
.nav-science.active::after{width:100%}
.nav-launch{font-family:'Space Mono',monospace;font-weight:400;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;padding:7px 16px;background:transparent;color:var(--saffron);border:1px solid rgba(232,175,56,0.4);text-decoration:none;transition:border-color .25s,color .25s;white-space:nowrap;flex-shrink:0}
.nav-launch:hover{border-color:var(--saffron);color:var(--saffron)}
.nav-tagline-strip{position:fixed;top:72px;left:0;right:0;z-index:999;height:24px;display:flex;align-items:center;justify-content:center;background:rgba(12,16,32,0.88);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(232,175,56,0.55)}
.nav-tagline-strip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,175,56,0.12),transparent)}

/* ── PAGE ── */
main{padding-top:120px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.page-hero{max-width:600px;margin:0 auto;padding:80px 48px 120px;text-align:center}
.tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--saffron);margin-bottom:24px}
.page-hero h1{font-family:'Sora',sans-serif;font-weight:200;font-size:clamp(2.5rem,5vw,4rem);letter-spacing:-0.03em;color:var(--ink);line-height:1.08;margin:0 0 32px}
.page-hero h1 span{color:var(--saffron)}
.pricing-line{font-family:'Sora',sans-serif;font-weight:300;font-size:clamp(1rem,1.6vw,1.2rem);color:var(--mid);line-height:1.7;margin:0 0 48px}
.pricing-line strong{color:var(--ink);font-weight:600}
.btn-main{font-family:'Sora',sans-serif;font-weight:600;font-size:0.95rem;letter-spacing:0.06em;padding:14px 40px;background:var(--ink);color:var(--linen);border:none;box-shadow:6px 6px 0 var(--saffron);transition:transform .25s,box-shadow .25s;white-space:nowrap;display:inline-block;text-decoration:none}
.btn-main:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 var(--saffron)}

@media(max-width:768px){
  .nav-center{display:none}
  .page-hero{padding:60px 24px 80px}
}
</style>
</head>
<body>

<div id="wizkoo-nav"></div>
<script src="/components/nav.js"></script>

<a href="/plan" class="nav-launch">Build Your Plan</a></div>
</div>

<main>
  <section class="page-hero">
    <div class="tag">The Price</div>
    <h1>Coming <span>soon.</span></h1>
    <p class="pricing-line"><strong>$50/month or $499/year.</strong><br>All your kids. Cancel anytime.</p>
    <a href="/plan" class="btn-main">Try Free First</a>
  </section>
</main>

</body>
</html>
