<!DOCTYPE html>
<html lang="en" data-surface="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading… | Wizkoo Library</title>
<meta name="description" content="A curated book in the Wizkoo Library — chosen because it opens more than one door.">
<link rel="canonical" id="bk-canonical" href="https://wizkoo.com/library">
<meta property="og:title" id="bk-og-title" content="Wizkoo Library">
<meta property="og:description" id="bk-og-desc" content="A curated book in the Wizkoo Library.">
<meta property="og:image" id="bk-og-image" content="https://wizkoo.com/assets/wizkoo-og.png">
<meta property="og:type" content="book">

<meta name="twitter:title" id="bk-tw-title" content="Wizkoo Library">

<meta name="twitter:image" id="bk-tw-image" content="https://wizkoo.com/assets/wizkoo-og.png">

<style>
/* ─────────────────────────────────────────────────
   D5 BOOK DETAIL PAGE — production template
   Surface: Warm Chalk #F8F4E9
   Footer: Treatment B (Continuous-Night, binary cut)
   Light Standard tokens locked.
───────────────────────────────────────────────── */

/* ── SURFACE RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--lib-bg, #0c1430);
  color: var(--lib-fg, #ece5d3);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── LOADING SHIMMER ── */
@keyframes bkShimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}
.bk-shimmer-block {
  background: linear-gradient(90deg, #ece8dd 25%, #f4f0e6 50%, #ece8dd 75%);
  background-size: 200% 100%;
  animation: bkShimmer 1.4s ease-in-out infinite;
  border-radius: 2px;
}
#bk-loading {
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 40px 60px;
  display: grid;
  grid-template-columns: 320px 1fr;
  column-gap: 36px;
}
.bk-loading-cover {
  aspect-ratio: 3 / 4;
}
.bk-loading-right {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-top: 8px;
}

/* ── SHARED UTILITIES ── */
.bk-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #E8AF38;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.bk-eyebrow::before {
  content: '';
  display: block;
  width: 20px;
  height: 1.5px;
  background: #E8AF38;
  flex-shrink: 0;
}

/* ── WRAP ── */
.bk-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
}

/* ── SCAN ZONE ── */
.bk-scan {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-areas:
    "band1-left band1-right"
    "band2-left band2-right";
  column-gap: 36px;
  row-gap: 10px;
  padding-top: 8px;
  align-items: start;
}
.bk-band1-left  { grid-area: band1-left; }
.bk-band1-right { grid-area: band1-right; padding-top: 4px; }
.bk-band2-left  { grid-area: band2-left; }
.bk-band2-right { grid-area: band2-right; }

/* cover frame */
.bk-cover-frame { width: 100%; }
.bk-cover-img {
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  display: block;
}
.bk-cover-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bk-cover-ph {
  width: 100%; height: 100%;
  background: linear-gradient(155deg, #C8852A 0%, #A86A1A 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  text-align: center;
}
.bk-cover-ph-title {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 1.7rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #E8AF38;
  line-height: 1.05;
  margin-bottom: 22px;
}
.bk-cover-ph-author {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(232,175,56,0.65);
}
.bk-cover-caption {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 6px;
  width: 100%;
}
.bk-cover-caption-text {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.8125rem;
  color: rgba(12,16,32,0.48);
  line-height: 1.4;
}
.bk-caption-orbital-rule {
  width: 45%;
  height: 1px;
  background: rgba(232,175,56,0.60);
  margin-top: 14px;
}

/* orbital diagram */
.bk-score-wrap {
  width: calc(100% + 226px);
  margin-left: -113px;
  margin-top: 4px;
}
.bk-score-svg { width: 100%; height: auto; display: block; }
.bk-score-fig {
  font-family: 'Space Mono', monospace;
  font-size: 0.625rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.65);
  margin-top: 6px;
  text-align: center;
}
.bk-score-standards {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.45);
  margin-top: 4px;
  text-align: center;
}
.bk-score-extra {
  font-family: 'Space Mono', monospace;
  font-size: 0.40rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.25);
  margin-top: 4px;
}

/* right column */
.bk-entry-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #E8AF38;
  margin-bottom: 12px;
}
.bk-pre-title-rule { width: 56px; height: 2px; background: #E8AF38; margin-bottom: 10px; }
.bk-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 2rem;
  line-height: 0.94;
  color: #0C1020;
  letter-spacing: -0.025em;
  margin-bottom: 10px;
}
.bk-title-dot { color: #E8AF38; }
.bk-title-rule { width: 65%; height: 1.5px; background: #E8AF38; margin-bottom: 10px; }
.bk-standfirst {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.1875rem;
  line-height: 1.45;
  color: #0C1020;
  margin-bottom: 10px;
}
.bk-byline {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 1.0rem;
  color: #0C1020;
  line-height: 1.4;
  margin-bottom: 4px;
}

/* decision card */
.bk-card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.bk-col-item {
  padding: 10px 20px;
  border-right: 1px solid #E8E2D4;
  border-bottom: 1px solid #E8E2D4;
}
.bk-col-item:first-child { padding-left: 0; }
.bk-col-item:nth-child(4) { border-right: none; padding-right: 0; }
.bk-col-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.46rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: rgba(232,175,56,0.80);
  margin-bottom: 6px;
  display: block;
}
.bk-col-value {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: #0C1020;
  line-height: 1.2;
  display: block;
  white-space: nowrap;
}
.bk-col-sub {
  display: block;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.8125rem;
  color: rgba(12,16,32,0.75);
  margin-top: 4px;
  white-space: nowrap;
}
.bk-decision-card {
  background: #FAFAFA;
  border: 1px solid #E8E2D4;
  padding: 20px 28px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 1px 0 rgba(12,16,32,0.04);
  transition: box-shadow 300ms cubic-bezier(0.16,1,0.3,1),
              transform  300ms cubic-bezier(0.16,1,0.3,1);
}
.bk-decision-card:hover {
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 1px 0 rgba(12,16,32,0.04),
              0 4px 12px rgba(12,16,32,0.06);
  transform: translateY(-2px);
}
.bk-cta-add,
.bk-cta-save {
  padding: 14px 0;
  font-family: 'Space Mono', monospace;
  font-size: 0.60rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-align: center;
  cursor: pointer;
  background: transparent;
  border: none;
  color: #0C1020;
  display: block;
  text-decoration: none;
  box-shadow: inset 0 -1px 0 0 #E8AF38;
  transition: background 200ms cubic-bezier(0.16,1,0.3,1),
              box-shadow 200ms cubic-bezier(0.16,1,0.3,1);
}
.bk-cta-add { grid-column: 1 / 3; border-right: 1px solid #E8E2D4; }
.bk-cta-save { grid-column: 3 / 5; }
.bk-cta-add:hover,
.bk-cta-save:hover {
  box-shadow: inset 0 -2px 0 0 #E8AF38;
  background: rgba(232,175,56,0.12);
}
.bk-tertiary-links {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #E8E2D4;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bk-tertiary-link {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.55);
  text-decoration: none;
  transition: color 200ms cubic-bezier(0.16,1,0.3,1);
}
.bk-tertiary-link:hover {
  color: #0C1020;
  text-decoration: underline;
  text-decoration-color: #E8AF38;
  text-underline-offset: 2px;
}
.bk-tertiary-link-icon { width: 14px; height: 14px; flex-shrink: 0; color: #E8AF38; }

/* heads-up */
.bk-headsup {
  margin-top: 56px;
  padding: 36px 0;
  border-top: 1px solid #E8E2D4;
  display: grid;
  grid-template-columns: 160px 1fr 64px;
  gap: 0 44px;
  align-items: start;
}
.bk-headsup-label { display: flex; flex-direction: column; gap: 5px; padding-top: 2px; }
.bk-headsup-keyword {
  font-family: 'Space Mono', monospace;
  font-size: 0.57rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #E8AF38;
}
.bk-headsup-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.74rem;
  color: rgba(12,16,32,0.48);
  line-height: 1.4;
}
.bk-headsup-body {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.0rem;
  line-height: 1.72;
  color: #0C1020;
}
.bk-headsup-register {
  font-family: 'Space Mono', monospace;
  font-size: 0.44rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.25);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  align-self: center;
  justify-self: center;
}

/* break */
.bk-break {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin: 48px auto 64px;
  width: fit-content;
}
.bk-break-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.57rem;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: #E8AF38;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.bk-break-dots-svg { display: block; flex-shrink: 0; }
.bk-break-rule { width: 56px; height: 1px; background: #E8AF38; opacity: 0.6; }

/* what makes it orbital */
.bk-what-orbital { margin-bottom: 48px; }
.bk-what-orbital-body {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 1.0625rem;
  line-height: 1.55;
  color: #0C1020;
}

/* depth zone */
.bk-depth { padding-bottom: 80px; }
.bk-on-reading-card {
  background: #FAFAFA;
  border: 1px solid #E8E2D4;
  padding: 24px;
  width: 70%;
  margin: 28px auto 28px 0;
}
.bk-on-reading-text {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.9375rem;
  line-height: 1.7;
  color: rgba(12,16,32,0.70);
}
.bk-orbital-body {
  font-family: 'Inter', sans-serif;
  font-size: 1.0rem;
  font-weight: 500;
  line-height: 1.75;
  color: rgba(12,16,32,0.76);
  margin-bottom: 14px;
}
.bk-best-for-text {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.0rem;
  line-height: 1.75;
  color: rgba(12,16,32,0.76);
}

/* talk about */
.bk-talk-about { margin-bottom: 48px; }
.bk-talk-about-cards { display: flex; flex-direction: column; gap: 12px; }
.bk-talk-about-card {
  background: #FAFAFA;
  border: 1px solid #E8E2D4;
  padding: 24px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 1.0rem;
  line-height: 1.65;
  color: #0C1020;
}

/* pairs with */
.bk-pairs-with { margin-bottom: 56px; }
.bk-pairs-with-body {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 1.0rem;
  line-height: 1.65;
  color: rgba(12,16,32,0.76);
}
.bk-pairs-with-body em {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
}

/* connection row */
.bk-network { padding: 0 0 80px; }
.bk-network-header { margin-bottom: 40px; }
.bk-network-headline {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 2.1rem;
  line-height: 1.15;
  color: #0C1020;
  margin-top: 10px;
}
.bk-network-headline em { font-style: italic; }
.bk-network-deck {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.88rem;
  line-height: 1.65;
  color: rgba(12,16,32,0.55);
  margin-top: 10px;
}
.bk-row-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.bk-row-card {
  background: #FAFAFA;
  border: 1px solid #E8E2D4;
  padding: 16px 16px 20px;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  transition: transform 300ms cubic-bezier(0.16,1,0.3,1),
              box-shadow 300ms cubic-bezier(0.16,1,0.3,1);
}
.bk-row-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(12,16,32,0.08);
}
.bk-rc-cover {
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  margin-bottom: 14px;
}
.bk-rc-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bk-rc-cover-art {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  text-align: center;
}
.bk-rc-cover-title {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 0.80rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.1;
}
.bk-rc-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 0.88rem;
  color: #0C1020;
  line-height: 1.2;
  margin-bottom: 4px;
}
.bk-rc-author {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 0.74rem;
  color: #3458B0;
}

/* threshold */
.bk-threshold { border: none; border-top: 1px solid #E8E2D4; margin: 0; }

/* ══════════════════════════════════════
   MEDIUM — ≤1100px CSS viewport
══════════════════════════════════════ */
@media (max-width: 1100px) {
  .bk-scan { grid-template-columns: 260px 1fr; }
  .bk-score-wrap { width: calc(100% + 80px); margin-left: -40px; }
  .bk-title { font-size: 2.5rem; }
  .bk-decision-card { padding: 16px 20px; }
  #bk-loading { grid-template-columns: 260px 1fr; }
}

/* ══════════════════════════════════════
   HIGH-DPI WIDE — DPR ≥ 1.5 at CSS viewport > 1100px
   e.g. Windows 175% DPI on ultrawide
══════════════════════════════════════ */
@media (-webkit-min-device-pixel-ratio: 1.5) and (min-width: 1101px),
       (min-resolution: 144dpi) and (min-width: 1101px) {
  .bk-scan { grid-template-columns: 260px 1fr; }
  .bk-score-wrap { width: calc(100% + 80px); margin-left: -40px; }
  .bk-title { font-size: 2.5rem; }
  .bk-decision-card { padding: 16px 20px; }
  #bk-loading { grid-template-columns: 260px 1fr; }
}

/* ══════════════════════════════════════
   LANDSCAPE-SHORT
══════════════════════════════════════ */
@media (max-height: 420px) and (min-width: 600px) {
  .bk-title { font-size: 2rem; line-height: 0.96; }
  .bk-scan { grid-template-columns: 200px 1fr; column-gap: 24px; }
}

/* ══════════════════════════════════════
   SHORT-WIDE
══════════════════════════════════════ */
@media (max-height: 700px) and (min-width: 768px) {
  .bk-title { font-size: 2rem; line-height: 0.96; }
  .bk-scan { grid-template-columns: 220px 1fr; column-gap: 28px; }
  .bk-decision-card { padding: 24px; }
  .bk-break { margin: 72px auto 48px; }
}

/* ══════════════════════════════════════
   MOBILE — 767px
══════════════════════════════════════ */
@media (max-width: 767px) {
  .bk-wrap { padding: 0 20px; }
  #bk-loading { padding: 60px 20px 40px; grid-template-columns: 1fr; }
  .bk-loading-cover { max-width: 200px; }
  .bk-scan {
    grid-template-columns: 1fr;
    grid-template-areas:
      "band1-left"
      "band1-right"
      "band2-left"
      "band2-right";
    row-gap: 0;
    column-gap: 0;
    padding-top: 20px;
  }
  .bk-cover-frame { width: 100%; }
  .bk-score-wrap { width: 100%; margin-left: 0; margin-top: 20px; }
  .bk-band1-right { padding-top: 28px; }
  .bk-title { font-size: 2.2rem; line-height: 0.96; }
  .bk-card-grid { grid-template-columns: 1fr 1fr; }
  .bk-col-item { padding: 14px 12px; }
  .bk-col-item:nth-child(odd)  { padding-left: 0; }
  .bk-col-item:nth-child(even) { border-right: none; padding-right: 0; }
  .bk-col-item:nth-child(3),
  .bk-col-item:nth-child(4)    { border-bottom: none; }
  .bk-decision-card { padding: 20px; }
  .bk-cta-add { grid-column: 1 / -1; border-right: none; padding: 16px 0; }
  .bk-cta-save { grid-column: 1 / -1; }
  .bk-headsup {
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 28px 0;
    margin-top: 36px;
  }
  .bk-headsup-label { flex-direction: row; align-items: baseline; gap: 10px; }
  .bk-headsup-register { display: none; }
  .bk-break { margin: 80px auto 56px; }
  .bk-depth { padding-bottom: 56px; }
  .bk-on-reading-card { width: 100%; margin-left: 0; }
  .bk-on-reading-text { font-size: 0.82rem; }
  .bk-row-cards { grid-template-columns: repeat(2, 1fr); gap: 14px; }
}

/* ══════════════════════════════════════
   PLANETARIUM LAYER — navy ground + star field + nebulas
══════════════════════════════════════ */
.lib-star-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
@keyframes libTwinkle {
  0%, 100% { opacity: var(--lo, 0.12); }
  50%       { opacity: var(--hi, 0.55); }
}
.lib-nebula {

  z-index: 0;
}

}

}
.lib-nb3 {
  width: 350px; height: 200px;
  bottom: 0; left: 10%;

<script>
(function(){
  var s = document.getElementById('bk-stars');
  if (!s) return;
  var html = '';
  for (var i = 0; i < 140; i++) {
    var x  = Math.random() * 100;
    var y  = Math.random() * 100;
    var sz = Math.random() < 0.7 ? 1 : Math.random() < 0.6 ? 1.5 : 2;
    var lo  = (0.05 + Math.random() * 0.12).toFixed(2);
    var hi  = (0.28 + Math.random() * 0.45).toFixed(2);
    var dur = (2 + Math.random() * 4).toFixed(1);
    var del = (Math.random() * 5).toFixed(1);
    html += '<div style="position:absolute;border-radius:50%;background:#F0F2F8;'
          + 'left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;'
          + 'animation:libTwinkle '+dur+'s ease-in-out infinite '+del+'s;'
          + '--lo:'+lo+';--hi:'+hi+';"></div>';
  }
  s.innerHTML = html;
})();
</script>

<script>
(function(){
  var c=document.getElementById('cursor'),cx=0,cy=0;window.mx=0;window.my=0;
  document.addEventListener('mousemove',function(e){window.mx=e.clientX;window.my=e.clientY;c.classList.add('visible')});
  document.addEventListener('mouseleave',function(){c.classList.remove('visible')});
  var sel='a,button,.bk-row-card';
  document.addEventListener('mouseover',function(e){if(e.target.closest(sel))c.classList.add('hover')});
  document.addEventListener('mouseout',function(e){if(e.target.closest(sel))c.classList.remove('hover')});
  (function tick(){cx+=(window.mx-cx)*0.15;cy+=(window.my-cy)*0.15;c.style.left=cx+'px';c.style.top=cy+'px';requestAnimationFrame(tick)})();
})();
</script>
