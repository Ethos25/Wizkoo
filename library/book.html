<meta property="og:description" id="bk-og-desc" content="A curated book in the Wizkoo Library.">

<style>
/* ═══════════════════════════════════════════════════════════
   WIZKOO LIBRARY ENTRY PAGE — Round 6.2
   Direction 3: Pull-Quote Spread.
   Surface: single unified cream card (Linen #F2F0EA) on Night Sky.
   Hero + full depth zone on one continuous cream surface.
   TALK ABOUT is the editorial centerpiece.
   Night Sky visible around the cream card. Footer on Night Sky.
═══════════════════════════════════════════════════════════ */

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── BODY — Night Sky environment ── */
body {
  background: radial-gradient(ellipse at 50% 45%, #182848 0%, #101830 70%);
  background-color: #101830;
  color: #F0F2F8;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

/* ── PLANETARIUM ENVIRONMENT — fixed, always behind ── */
.lib-star-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
@keyframes libTwinkle {
  0%, 100% { opacity: var(--lo, 0.12); }
  50%       { opacity: var(--hi, 0.55); }
}
.lib-nebula {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.lib-nb1 {
  width: 500px; height: 300px; top: -60px; left: 20%;
  background: radial-gradient(ellipse, rgba(230,168,46,0.055) 0%, transparent 70%);
}
.lib-nb2 {
  width: 400px; height: 400px; top: 200px; right: -80px;
  background: radial-gradient(ellipse, rgba(100,130,220,0.04) 0%, transparent 70%);
}
.lib-nb3 {
  width: 350px; height: 200px; bottom: 0; left: 10%;
  background: radial-gradient(ellipse, rgba(230,168,46,0.03) 0%, transparent 70%);
}

/* ── LOADING SHIMMER ── */
@keyframes bkShimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}
.bk-shimmer {
  background: linear-gradient(90deg,
    rgba(12,16,32,0.07) 25%,
    rgba(12,16,32,0.13) 50%,
    rgba(12,16,32,0.07) 75%);
  background-size: 200% 100%;
  animation: bkShimmer 1.4s ease-in-out infinite;
  border-radius: 2px;
}
#bk-loading {
  padding: 40px 0 0;
  position: relative;
  z-index: 2;
}
.bk-loading-card {
  width: 90%;
  max-width: 1020px;
  margin: 0 auto;
  background: #F2F0EA;
  padding: 48px 52px 52px;
}
.bk-loading-grid {
  display: grid;
  grid-template-columns: 400px 1fr;
  column-gap: 52px;
}
.bk-loading-cover { aspect-ratio: 2/3; width: 100%; }
.bk-loading-right {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-top: 6px;
}

/* ── CONTENT OUTER ── */
.bk-content-outer { position: relative; z-index: 2; }

/* ── UPPER — Night Sky wrapper ── */
.bk-upper { padding: 40px 0 0; }

/* ═══════════════════════════════════════════════════════════
   THE UNIFIED CREAM CARD
   Contains: hero + section break + full depth zone.
   Night Sky visible on left and right. Card ends cleanly before footer.
   Canonical width: 90% / 1020px max — deliberate frame, not default container.
═══════════════════════════════════════════════════════════ */
.bk-cream-card {
  width: 90%;
  max-width: 1020px;
  margin: 0 auto;
  background: #F2F0EA; /* Linen */
  padding: 48px 52px 0; /* bottom padding via .bk-depth-inner */
}

/* ── TWO-COLUMN HERO GRID ── */
.bk-card-grid {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 52px;
  align-items: start;
}

/* ── LEFT COLUMN — book artifact ── */
.bk-cover-frame {
  width: 100%;
  aspect-ratio: 2 / 3;
  background: #F2F0EA; /* Linen letterbox — blends invisibly */
  overflow: hidden;
}
.bk-cover-frame img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.bk-cover-ph {
  width: 100%; height: 100%;
  background: linear-gradient(155deg, #C8852A 0%, #A86A1A 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  text-align: center;
}
.bk-cover-ph-title {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 1.7rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #E8AF38;
  line-height: 1.05;
  margin-bottom: 22px;
}
.bk-cover-ph-author {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(232,175,56,0.65);
}

.bk-credit { margin-top: 12px; }
.bk-credit-line {
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-size: 0.875rem;
  color: #5F5E5A;
  line-height: 1.55;
}
.bk-credit-name {
  font-style: normal;
  font-weight: 600;
  color: #5F5E5A;
}
.bk-credit-name-link {
  font-style: normal;
  font-weight: 600;
  color: #5F5E5A;
  text-decoration: underline;
  text-decoration-color: rgba(95,94,90,0.28);
  text-underline-offset: 2px;
  transition: color 160ms, text-decoration-color 160ms;
}
.bk-credit-name-link:hover { color: #0C1020; text-decoration-color: rgba(232,175,56,0.5); }
.bk-credit-year {
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-size: 0.875rem;
  color: #8C8A84;
  margin-top: 2px;
}

/* ── RIGHT COLUMN — editorial + action ── */
.bk-col-right { display: flex; flex-direction: column; }

.bk-breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.5625rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.4);
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.bk-breadcrumb-sep { color: rgba(12,16,32,0.2); font-size: 0.65rem; }
.bk-breadcrumb a { color: rgba(12,16,32,0.4); text-decoration: none; transition: color 160ms; }
.bk-breadcrumb a:hover { color: rgba(12,16,32,0.75); }
.bk-breadcrumb-current { color: rgba(12,16,32,0.28); }

/* Section label — saffron moment #1 of 3 */
.bk-section-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.625rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #E8AF38;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.bk-section-label::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: #E8AF38;
  flex-shrink: 0;
}

.bk-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: clamp(3rem, 5.5vw, 4.5rem);
  line-height: 0.92;
  color: #0C1020;
  letter-spacing: -0.03em;
  margin-bottom: 22px;
  word-break: break-word;
}
.bk-title em { font-style: italic; font-weight: 400; }
.bk-title-dot { color: #E8AF38; } /* saffron moment #2 of 3 */

.bk-hook {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.0625rem, 1.5vw, 1.25rem);
  line-height: 1.5;
  color: rgba(12,16,32,0.78);
  margin-bottom: 24px;
}

/* Theme pills — between hook and decision card */
.bk-theme-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.bk-theme-pill {
  font-family: 'Space Mono', monospace;
  font-size: 0.5625rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #5F5E5A;
  border: 1px solid #E0DED6;
  border-radius: 999px;
  padding: 6px 14px;
  background: transparent;
  display: inline-flex;
  align-items: center;
}

/* Decision card — Paper #FAFAFA on Linen */
.bk-decision-card { background: #FAFAFA; border: 1px solid #E0DED6; color: #0C1020; }
.bk-meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
.bk-meta-cell {
  padding: 10px 16px 9px;
  border-right: 1px solid #E0DED6;
  border-bottom: 1px solid #E0DED6;
}
.bk-meta-cell:last-child { border-right: none; }
.bk-meta-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.4375rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.45);
  margin-bottom: 5px;
  display: block;
}
.bk-meta-value {
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: #0C1020;
  line-height: 1.2;
  display: block;
  white-space: nowrap;
}
.bk-meta-sub {
  display: block;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.75rem;
  color: rgba(12,16,32,0.55);
  margin-top: 3px;
  white-space: nowrap;
}

/* CTA pair */
.bk-cta-pair { display: grid; grid-template-columns: 1fr 1fr; }
.bk-cta-primary, .bk-cta-secondary {
  padding: 16px 0;
  font-family: 'Space Mono', monospace;
  font-size: 0.5625rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-align: center;
  cursor: pointer;
  border: none;
  display: block;
  text-decoration: none;
  position: relative;
  transition: background 180ms cubic-bezier(0.16,1,0.3,1);
}
.bk-cta-primary { background: #E8AF38; color: #0C1020; border-right: 1px solid rgba(12,16,32,0.12); } /* saffron moment #3 of 3 */
.bk-cta-primary:hover { background: #D49E2A; }
.bk-cta-primary::before {
  content: '';
  position: absolute;
  top: 7px; left: 7px;
  width: 9px; height: 9px;
  border-top: 1.5px solid rgba(12,16,32,0.28);
  border-left: 1.5px solid rgba(12,16,32,0.28);
}
.bk-cta-secondary { background: transparent; color: #0C1020; }
.bk-cta-secondary:hover { background: rgba(12,16,32,0.04); }
.bk-cta-secondary::after {
  content: '';
  position: absolute;
  bottom: 7px; right: 7px;
  width: 9px; height: 9px;
  border-bottom: 1.5px solid rgba(12,16,32,0.22);
  border-right: 1.5px solid rgba(12,16,32,0.22);
}

.bk-standards {
  font-family: 'Space Mono', monospace;
  font-size: 0.4375rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.4);
  margin-top: 8px;
}
.bk-tertiary-links { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
.bk-tertiary-link {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'Space Mono', monospace;
  font-size: 0.5625rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.4);
  text-decoration: none;
  transition: color 160ms;
}
.bk-tertiary-link:hover { color: #0C1020; }
.bk-tertiary-link-icon { width: 13px; height: 13px; flex-shrink: 0; color: rgba(12,16,32,0.35); }

/* ═══════════════════════════════════════════════════════════
   SECTION BREAK — "THE FULL ENTRY"
   Internal page turn within the unified cream card.
   32px saffron rule + Space Mono label, centered.
═══════════════════════════════════════════════════════════ */
.bk-section-break {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 56px 0 40px;
}
.bk-section-break-rule {
  width: 32px;
  height: 1.5px;
  background: #E8AF38;
}
.bk-section-break-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.625rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #E8AF38;
}

/* ═══════════════════════════════════════════════════════════
   DEPTH ZONE — inside the unified cream card
   Sub-section eyebrows: 32px saffron rule above text (column flex).
   Each section has its own spacing block.
═══════════════════════════════════════════════════════════ */
.bk-depth-inner {
  padding-bottom: 128px;
}

/* Sub-section eyebrow — 32px saffron rule ABOVE text */
.bk-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #E8AF38;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 24px;
}
.bk-eyebrow::before {
  content: '';
  display: block;
  width: 32px;
  height: 1.5px;
  background: #E8AF38;
  flex-shrink: 0;
}
/* Centered eyebrow variant — used for TALK ABOUT header */
.bk-eyebrow--centered {
  align-items: center;
  margin-bottom: 0;
}

/* ── Heads-Up ── */
.bk-headsup {
  margin-bottom: 96px;
  padding: 32px 0;
  border-top: 1px solid #E0DED6;
  display: grid;
  grid-template-columns: 160px 1fr 64px;
  gap: 0 44px;
  align-items: start;
}
.bk-headsup-label { display: flex; flex-direction: column; gap: 5px; padding-top: 2px; }
.bk-headsup-keyword {
  font-family: 'Space Mono', monospace;
  font-size: 0.57rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #E8AF38;
}
.bk-headsup-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.74rem;
  color: rgba(12,16,32,0.48);
  line-height: 1.4;
}
.bk-headsup-body {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.0rem;
  line-height: 1.72;
  color: #0C1020;
}
.bk-headsup-register {
  font-family: 'Space Mono', monospace;
  font-size: 0.44rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(12,16,32,0.25);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  align-self: center;
  justify-self: center;
}

/* ── What Makes It Orbital ── */
.bk-what-orbital { margin-bottom: 96px; }
.bk-what-orbital-body {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 1.0625rem;
  line-height: 1.55;
  color: #0C1020;
}

/* ── The Orbital Description ── */
.bk-depth { padding-bottom: 96px; }
.bk-orbital-body {
  font-family: 'Inter', sans-serif;
  font-size: 1.0625rem;
  font-weight: 400;
  line-height: 1.6;
  color: #0C1020;
  max-width: 65ch;
}

/* ── On Reading ── */
.bk-on-reading-wrap { margin-bottom: 96px; }
.bk-on-reading-card {
  background: #FAFAFA;
  border: 1px solid #E0DED6;
  padding: 28px 32px;
  max-width: 72%;
}
.bk-on-reading-text {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 0.9375rem;
  line-height: 1.7;
  color: rgba(12,16,32,0.70);
}

/* ── Best For ── */
.bk-best-for { margin-bottom: 96px; }
.bk-best-for-text {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.3125rem;
  line-height: 1.5;
  color: #0C1020;
}

/* ═══════════════════════════════════════════════════════════
   TALK ABOUT — Round 6.3: Magazine pull-quote rows
   Two-column: big architectural numeral left, question right.
   No card containers. Hairline rules between rows.
   Saffron curly quotes hug each question.
═══════════════════════════════════════════════════════════ */
.bk-talk-about { margin-bottom: 96px; }

/* Header: centered eyebrow + Fraunces italic subhead */
.bk-talk-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 56px;
}
.bk-talk-headline {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.375rem, 2vw, 1.5625rem);
  line-height: 1.45;
  color: #0C1020;
  margin-top: 28px;
  max-width: 40ch;
}

/* Questions container — centered, max-width 760px */
.bk-talk-questions {
  display: flex;
  flex-direction: column;
  max-width: 760px;
  margin: 0 auto;
}

/* Individual question row */
.bk-talk-row {
  display: flex;
  align-items: flex-start;
  gap: 48px;
  padding-bottom: 40px;
  border-bottom: 1px solid #E0DED6;
  margin-bottom: 40px;
}
.bk-talk-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

/* Left column — architectural numeral */
.bk-talk-col-num {
  width: 180px;
  flex-shrink: 0;
}
.bk-talk-big-num {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: clamp(5rem, 8vw, 6rem);
  line-height: 1;
  color: #C8C5BC;
  display: block;
  padding-top: 16px;
}

/* Right column — question + theme label + prompt */
.bk-talk-col-content {
  flex: 1;
  min-width: 0;
  padding-top: 14px;
}
.bk-talk-q {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.5rem, 2.25vw, 1.875rem);
  line-height: 1.4;
  color: #0C1020;
}
/* Saffron curly quotes — typographic ornaments hugging the question */
.bk-talk-quote { color: #E8AF38; }

/* Theme label — from talk_about_themes[] field when populated */
.bk-talk-theme {
  font-family: 'Space Mono', monospace;
  font-size: 0.625rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #5F5E5A;
  margin-top: 18px;
  display: block;
}

/* Companion prompt — from talk_about_prompts[] field when populated */
.bk-talk-prompt {
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-size: 0.875rem;
  line-height: 1.5;
  color: #5F5E5A;
  margin-top: 14px;
}

/* ── Pairs With ── */
.bk-pairs-with { margin-bottom: 96px; }
.bk-pairs-with-body {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 1.0625rem;
  line-height: 1.7;
  color: #0C1020;
}
.bk-pairs-with-body em {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
}

/* ═══════════════════════════════════════════════════════════
   THE CONSTELLATION — curatorial, 3 books
   Covers on cream (object-fit contain). No card containers.
   Left-aligned with all other depth zone sections.
═══════════════════════════════════════════════════════════ */
.bk-network {
  /* No max-width or centering — aligns to depth zone left edge */
}
.bk-network-header { margin-bottom: 56px; }
.bk-network-headline {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: clamp(2.25rem, 4vw, 3rem);
  line-height: 1.1;
  color: #0C1020;
  margin-top: 12px;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.bk-network-headline em { font-style: italic; font-weight: 400; }
/* Curatorial framing line */
.bk-constellation-frame {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.0625rem;
  line-height: 1.55;
  color: #5F5E5A;

/* 3-column grid — covers float on cream, no card containers */
.bk-row-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
}
.bk-row-card {
  background: transparent;

  margin-bottom: 18px;

}
.bk-rc-cover img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* no cropping — letterbox in cream */
  display: block;
}
.bk-rc-cover-art {

  padding: 16px 12px; text-align: center;

}
.bk-rc-cover-title {

}
.bk-rc-title {

.bk-rc-connection {

/* ══════════════════════════════════════

══════════════════════════════════════ */
.page-library .announce { background: #0C1020 !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }

/* ══════════════════════════════════════

══════════════════════════════════════ */

<!-- Star field -->
<script>
(function(){
  var s = document.getElementById('bk-stars');
  if (!s) return;
  var html = '';
  for (var i = 0; i < 140; i++) {
    var x  = Math.random() * 100;
    var y  = Math.random() * 100;
    var sz = Math.random() < 0.7 ? 1 : Math.random() < 0.6 ? 1.5 : 2;
    var lo  = (0.05 + Math.random() * 0.12).toFixed(2);
    var hi  = (0.28 + Math.random() * 0.45).toFixed(2);
    var dur = (2 + Math.random() * 4).toFixed(1);
    var del = (Math.random() * 5).toFixed(1);
    html += '<div style="position:absolute;border-radius:50%;background:#F0F2F8;'
          + 'left:'+x+'%;top:'+y+'%;width:'+sz+'px;height:'+sz+'px;'
          + 'animation:libTwinkle '+dur+'s ease-in-out infinite '+del+'s;'
          + '--lo:'+lo+';--hi:'+hi+';"></div>';
  }
  s.innerHTML = html;
})();
</script>
<script>
(function(){
  var c=document.getElementById('cursor'),cx=0,cy=0;window.mx=0;window.my=0;
  document.addEventListener('mousemove',function(e){window.mx=e.clientX;window.my=e.clientY;c.classList.add('visible')});
  document.addEventListener('mouseleave',function(){c.classList.remove('visible')});
  var sel='a,button,.bk-row-card';
  document.addEventListener('mouseover',function(e){if(e.target.closest(sel))c.classList.add('hover')});
  document.addEventListener('mouseout',function(e){if(e.target.closest(sel))c.classList.remove('hover')});
  (function tick(){cx+=(window.mx-cx)*0.15;cy+=(window.my-cy)*0.15;c.style.left=cx+'px';c.style.top=cy+'px';requestAnimationFrame(tick)})();
})();
</script>
