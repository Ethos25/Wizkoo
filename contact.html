<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — wizkoo</title>
<meta name="description" content="Get in touch with the Wizkoo team.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600;700;800&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --saffron:#E8AF38;--ink:#0C1020;--linen:#F2F0EA;--warm-bg:#ECEAE3;
  --rule:#E0DED6;--mid:#666;
  --expo:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--linen);color:var(--ink);overflow-x:hidden}
a{text-decoration:none;color:inherit}
@media(hover:hover){html,body,a,button{cursor:none}}
.cursor{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--saffron);pointer-events:none;z-index:9999;transition:width .25s var(--expo),height .25s var(--expo),margin .25s var(--expo),opacity .2s;opacity:0;mix-blend-mode:exclusion}
.cursor.visible{opacity:1}
.cursor.hover{width:28px;height:28px;margin:-10px 0 0 -10px;background:rgba(232,175,56,0.25);border:1.5px solid var(--saffron)}

/* ── NAV ── */
.site-nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;background:rgba(12,16,32,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.site-nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,175,56,0.4),transparent);opacity:0.4}
.nav-bar{display:flex;align-items:center;height:100%;padding:0 32px;gap:24px}
.nav-wm{font-family:'Sora',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.04em;color:#F2F0EA;text-decoration:none;margin-right:auto;flex-shrink:0}
.nav-wm .i-fix{font-style:italic}
.nav-wm .k{letter-spacing:-0.06em}
.nav-wm .wm-dot{color:var(--saffron)}
.nav-center{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;gap:28px;flex:1;justify-content:center}
.nav-science{font-family:'Space Mono',monospace;font-weight:400;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(250,250,250,0.3);text-decoration:none;transition:color .25s;white-space:nowrap;position:relative;padding-bottom:2px}
.nav-science::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--saffron);transition:width .3s var(--expo)}
.nav-science:hover{color:rgba(250,250,250,0.8)}
.nav-science:hover::after{width:100%}
.nav-launch{font-family:'Space Mono',monospace;font-weight:400;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;padding:7px 16px;background:transparent;color:var(--saffron);border:1px solid rgba(232,175,56,0.4);text-decoration:none;transition:border-color .25s,color .25s;white-space:nowrap;flex-shrink:0}
.nav-launch:hover{border-color:var(--saffron);color:var(--saffron)}
.nav-tagline-strip{position:fixed;top:72px;left:0;right:0;z-index:999;height:24px;display:flex;align-items:center;justify-content:center;background:rgba(12,16,32,0.88);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(232,175,56,0.55)}
.nav-tagline-strip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,175,56,0.12),transparent)}

/* ── PAGE ── */
main{padding-top:96px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.page-hero{max-width:640px;margin:0 auto;padding:80px 48px 120px;text-align:center}
.tag{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin-bottom:20px}
.page-hero h1{font-family:'Sora',sans-serif;font-weight:200;font-size:1.8rem;letter-spacing:-0.02em;color:var(--ink);line-height:1.2;margin:0 0 20px}
.page-hero p{font-family:'Inter',sans-serif;font-size:0.9rem;color:#777;line-height:1.75;max-width:520px;margin:0 auto}
.contact-email{display:inline-block;margin-top:24px;font-family:'Space Mono',monospace;font-size:0.72rem;letter-spacing:0.08em;color:var(--ink);border-bottom:1px solid rgba(232,175,56,0.5);padding-bottom:2px;transition:border-color .25s,color .25s}
.contact-email:hover{color:var(--ink);border-color:var(--saffron)}
@media(max-width:768px){
  .nav-center{display:none}
  .page-hero{padding:60px 24px 80px}
}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<div class="site-nav" id="site-nav" role="navigation">
  <div class="nav-bar"><a href="/" class="nav-wm" aria-label="Home">w<span class="i-fix">i</span>z<span class="k">k</span>o<span class="wm-dot">o</span></a><div class="nav-center"><a href="/plan" class="nav-science">The Plan</a><a href="games.html" class="nav-science">The Games</a><a href="library.html" class="nav-science">The Library</a><a href="methodology.html" class="nav-science">The Science</a><a href="ages.html" class="nav-science">The Ages</a><a href="/the-open-seat" class="nav-science">The Open Seat</a><a href="pricing.html" class="nav-science">The Price</a></div><a href="/plan" class="nav-launch">Build Your Plan</a></div>
</div>
<div class="nav-tagline-strip">Weekly learning plans. Built around your people.</div>

<main>
  <section class="page-hero">
    <div class="tag">Contact</div>
    <h1>We'd love to hear from you.</h1>
    <p>Coming soon.</p>
    <a href="mailto:hello@wizkoo.com" class="contact-email">hello@wizkoo.com</a>
  </section>
</main>

<div id="site-footer"></div>
<script src="/components/footer.js"></script>
<script>
(function(){
  if(!window.matchMedia('(hover:hover) and (pointer:fine)').matches)return;
  var c=document.getElementById('cursor');if(!c)return;
  var raf;
  document.addEventListener('mousemove',function(e){cancelAnimationFrame(raf);raf=requestAnimationFrame(function(){c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';c.classList.add('visible');});});
  document.addEventListener('mouseover',function(e){c.classList.toggle('hover',!!e.target.closest('a,button,[role="button"]'));});
  document.documentElement.addEventListener('mouseleave',function(){c.classList.remove('visible');});
})();
</script>
</body>
</html>
